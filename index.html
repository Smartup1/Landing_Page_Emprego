<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 1.5s infinite ease-in-out;
        }
        @keyframes twinkle {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        @keyframes rocket-animation {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-100vh); }
        }
        #rocket {
            position: absolute;
            left: 50%;
            bottom: -100px;
            width: 50px;
            height: 120px;
            background: radial-gradient(circle, red, orange);
            animation: rocket-animation 5s infinite;
        }
        #exhaust {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 10px;
            height: 20px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.5), transparent);
            animation: exhaust-animation 5s infinite;
        }
        @keyframes exhaust-animation {
            0% { opacity: 1; transform: translateX(-50%); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
    </style>
</head>
<body>
    <div id="rocket">
        <div id="exhaust"></div>
    </div>
    <script>
        // Create stars in the sky
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 5 + 5;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            document.body.appendChild(star);
        }
    </script>
</body>
</html>
