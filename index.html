<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2282487628451754"
   crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagas Abertas</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #050505;
  color: white;
  overflow-x: hidden;
}

/* Canvas ocupa tudo */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Conteúdo */
header {
  text-align: center;
  padding: 80px 20px;
}

header h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #00f2ff, #ff00c8);
  -webkit-background-clip: text;
  color: transparent;
}

header p {
  color: #aaa;
}

/* Card glass */
.container {
  max-width: 500px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 40px rgba(0,255,255,0.1);
}

/* Inputs */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* Botão futurista */
button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #00f2ff, #ff00c8);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #00f2ff;
}

.ads {
  margin: 25px 0;
  text-align: center;
  color: #888;
}

footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px;
  color: #666;
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<header>
  <h1>🚀 Busque emprego com IA envie seu curriculum</h1>
  <p>Envie seu currículo e entre para o futuro</p>
</header>

<div class="container">

  <div class="ads">✨ Espaço AdSense</div>

  <form>
    <input type="text" placeholder="Nome completo" required>
    <input type="email" placeholder="Email" required>
    <input type="tel" placeholder="Telefone">
    <select>
      <option>Escolha a vaga</option>
      <option>TI</option>
      <option>Admin</option>
    </select>
    <textarea placeholder="Fale sobre você"></textarea>
    <input type="file">
    <button>Enviar Currículo</button>
  </form>

  <div class="ads">✨ Espaço AdSense</div>

</div>

<footer>© 2026</footer>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5
  });
}

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animate() {
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  stars.forEach(star => {
    star.y += star.speed;

    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }

    let dx = (mouseX - canvas.width / 2) * 0.0005;
    let dy = (mouseY - canvas.height / 2) * 0.0005;

    ctx.beginPath();
    ctx.arc(star.x + dx * 50, star.y + dy * 50, star.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
