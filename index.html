<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabalhe Conosco</title>

  <!-- AdSense (substituir pelo seu código depois) -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script> -->

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0d6efd;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0b5ed7;
    }

    .ads {
      margin: 30px 0;
      text-align: center;
      background: #eee;
      padding: 20px;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

<header>
  <h1>🚀 Trabalhe Conosco</h1>
  <p>Envie seu currículo e faça parte da nossa equipe</p>
</header>

<div class="container">

  <div class="ads">
    <!-- Espaço para AdSense -->
    <p>🔹 Espaço para anúncio</p>
  </div>

  <h2>Cadastro de Candidato</h2>

  <form action="#" method="POST" enctype="multipart/form-data">
    
    <label>Nome completo</label>
    <input type="text" name="nome" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Telefone</label>
    <input type="tel" name="telefone" required>

    <label>Vaga desejada</label>
    <select name="vaga">
      <option>Atendimento</option>
      <option>TI / Desenvolvedor</option>
      <option>Administrativo</option>
      <option>Outros</option>
    </select>

    <label>Mensagem</label>
    <textarea name="mensagem" rows="3"></textarea>

    <label>Enviar currículo (PDF/DOC)</label>
    <input type="file" name="curriculo" accept=".pdf,.doc,.docx" required>

    <button type="submit">Enviar Candidatura</button>
  </form>

  <div class="ads">
    <!-- Outro espaço para AdSense -->
    <p>🔹 Espaço para anúncio</p>
  </div>

</div>

<footer>
  © 2026 - Sua Empresa | Todos os direitos reservados
</footer>

</body>
</html>
