<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagas Abertas</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Arial', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* Background animado */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, #0d6efd33, transparent),
              radial-gradient(circle at 80% 80%, #ff00cc33, transparent);
  animation: moveBg 10s infinite alternate;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  100% { transform: translate(-50px,-50px); }
}

header {
  text-align: center;
  padding: 60px 20px;
}

header h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #0d6efd, #ff00cc);
  -webkit-background-clip: text;
  color: transparent;
}

header p {
  margin-top: 10px;
  color: #ccc;
}

/* Container */
.container {
  max-width: 500px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

/* Inputs */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* Botão */
button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #0d6efd, #ff00cc);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Ads */
.ads {
  margin: 30px 0;
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 10px;
}

/* Footer */
footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px;
  color: #777;
}

</style>
</head>

<body>

<header>
  <h1>Trabalhe Conosco</h1>
  <p>Envie seu currículo e comece sua carreira</p>
</header>

<div class="container">

  <div class="ads">
    🔥 Espaço AdSense
  </div>

  <form>

    <input type="text" placeholder="Nome completo" required>
    <input type="email" placeholder="Email" required>
    <input type="tel" placeholder="Telefone">

    <select>
      <option>Escolha a vaga</option>
      <option>TI / Desenvolvedor</option>
      <option>Administrativo</option>
      <option>Atendimento</option>
    </select>

    <textarea placeholder="Fale sobre você"></textarea>

    <input type="file">

    <button type="submit">Enviar Currículo</button>

  </form>

  <div class="ads">
    🔥 Espaço AdSense
  </div>

</div>

<footer>
  © 2026 - Sua Empresa
</footer>

</body>
</html>
